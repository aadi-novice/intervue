services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: intervue_postgres
    environment:
      POSTGRES_USER: intervue
      POSTGRES_PASSWORD: intervue123
      POSTGRES_DB: intervue_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

